<!DOCTYPE html>
<html>
<head>
    <title>Ethical Fintech Auditor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="mb-4">🛡️ Ethical AI Loan Auditor</h1>
        <div class="card shadow">
            <div class="card-body">
                <h5 class="card-title">Loan Application Result</h5>
                <hr>
                <div class="alert {{ 'alert-danger' if result.decision == 'REJECTED' else 'alert-success' }}">
                    <h3>Decision: {{ result.decision }}</h3>
                </div>
                
                <p><strong>Primary Factor:</strong> <span class="badge bg-primary">{{ result.factor }}</span></p>
                <p><strong>Explanation:</strong> {{ result.explanation }}</p>
                
                {% if result.decision == 'REJECTED' %}
                <div class="mt-4 p-3 border-start border-4 border-warning bg-white">
                    <h5>💡 Actionable Plan</h5>
                    <p>{{ result.advice }}</p>
                </div>
                {% endif %}
                
                <div class="mt-4">
                    <small class="text-muted">Model Confidence: {{ result.confidence }}</small>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
